version: 1
applications:
  - appRoot: application
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 24.14.0
            - nvm use 24.14.0
            - corepack enable
            - corepack prepare pnpm@10.32.1 --activate
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
